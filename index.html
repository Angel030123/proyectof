<!DOCTYPE html>
<html lang="es">
<head>
    <title>Cruzada Mecánica VR - Debug 2</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #portada, #loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; background: rgba(0,0,0,0.95); z-index: 300; text-align: center;
        }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-size: 22px; z-index: 100; text-shadow: 0 0 8px black; }
    </style>
</head>
<body>
    <div id="portada">
        <h1>CRUZADA MECÁNICA</h1>
        <p>Debug 2 - Prueba VR</p>
        <p>Pulsa "Enter VR"</p>
    </div>

    <div id="loading" style="display:none;">
        <h2>Cargando...</h2>
    </div>

    <div id="ui" style="display:none;">
        ⭐ <span id="pts">0</span>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "./build/three.module.js",
            "three/addons/": "./examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, dolly, clock;
        let gameActive = false;

        const portada = document.getElementById('portada');
        const loading = document.getElementById('loading');
        const ui = document.getElementById('ui');

        async function init() {
            clock = new THREE.Clock();
            scene = new THREE.Scene();

            // Luces fuertes
            scene.add(new THREE.AmbientLight(0xffffff, 2.0));
            const hemiLight = new THREE.HemisphereLight(0xaaaaee, 0x112233, 1.2);
            scene.add(hemiLight);

            scene.background = new THREE.Color(0x88aaff);   // Azul cielo más claro

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 3000);
            dolly = new THREE.Group();
            dolly.add(camera);
            scene.add(dolly);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(1.6);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // Controllers
            const factory = new XRControllerModelFactory();
            for (let i = 0; i < 2; i++) {
                const grip = renderer.xr.getControllerGrip(i);
                grip.add(factory.createControllerModel(grip));
                dolly.add(grip);
            }

            loading.style.display = 'flex';

            // Suelo mejorado
            const floorGeo = new THREE.PlaneGeometry(2000, 2000);
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x556633 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -30;
            scene.add(floor);

            // Cajas de prueba grandes y cercanas (más visibles)
            const boxMat = new THREE.MeshLambertMaterial({ color: 0xff8800 });
            for (let i = 0; i < 12; i++) {
                const box = new THREE.Mesh(new THREE.BoxGeometry(80, 80, 80), boxMat);
                box.position.set(
                    (Math.random() - 0.5) * 400,
                    40,
                    -150 - i * 180
                );
                scene.add(box);
            }

            // Intentar cargar cofres reales
            const loader = new GLTFLoader();
            for (let i = 0; i < 6; i++) {
                loader.load('examples/models/gltf/medieval_chest/scene.gltf', (gltf) => {
                    const model = gltf.scene;
                    model.scale.set(50, 50, 50);
                    model.position.set(
                        (Math.random() - 0.5) * 300,
                        0,
                        -300 - i * 250
                    );
                    scene.add(model);
                });
            }

            loading.style.display = 'none';

            renderer.xr.addEventListener('sessionstart', () => {
                portada.style.display = 'none';
                ui.style.display = 'block';
                gameActive = true;
                dolly.position.y = 20;   // altura de ojos
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function animate() {
            renderer.setAnimationLoop(() => {
                const delta = clock.getDelta();
                if (gameActive) {
                    dolly.translateZ(-55 * delta);   // avance moderado
                }
                renderer.render(scene, camera);
            });
        }

        init();
        animate();
    </script>
</body>
</html>
