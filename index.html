<!DOCTYPE html>
<html lang="es">
<head>
    <title>Cruzada Mecánica VR - Debug</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #portada, #loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; background: rgba(0,0,0,0.95); z-index: 300; text-align: center;
        }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-size: 20px; z-index: 100; text-shadow: 0 0 8px black; }
    </style>
</head>
<body>
    <div id="portada">
        <h1>CRUZADA MECÁNICA</h1>
        <p>Versión Debug VR</p>
        <p>Pulsa "Enter VR" para probar</p>
    </div>

    <div id="loading" style="display:none;">
        <h2>Cargando escena...</h2>
    </div>

    <div id="ui" style="display:none;">
        ⭐ <span id="pts">0</span>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "./build/three.module.js",
            "three/addons/": "./examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, dolly, clock;
        let gameActive = false;
        let puntos = 0;

        const portada = document.getElementById('portada');
        const loading = document.getElementById('loading');
        const ui = document.getElementById('ui');

        async function init() {
            clock = new THREE.Clock();
            scene = new THREE.Scene();

            // === LUCES FUERTES (importante para no ver negro) ===
            scene.add(new THREE.AmbientLight(0xffffff, 1.8));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            // Fondo simple (más confiable que HDR en Quest)
            scene.background = new THREE.Color(0x112233);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
            dolly = new THREE.Group();
            dolly.add(camera);
            scene.add(dolly);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(1.5);           // bajo para Quest
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // Controllers
            const factory = new XRControllerModelFactory();
            for (let i = 0; i < 2; i++) {
                const grip = renderer.xr.getControllerGrip(i);
                grip.add(factory.createControllerModel(grip));
                dolly.add(grip);
            }

            // === OBJETOS DE PRUEBA (fáciles de ver) ===
            loading.style.display = 'flex';

            const loader = new GLTFLoader();

            // Suelo visible
            const floorGeo = new THREE.PlaneGeometry(2000, 2000);
            const floorMat = new THREE.MeshBasicMaterial({ color: 0x334422 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -30;
            scene.add(floor);

            // Cajas de prueba grandes y cercanas
            for (let i = 0; i < 8; i++) {
                loader.load('examples/models/gltf/medieval_chest/scene.gltf', (gltf) => {
                    const model = gltf.scene;
                    model.scale.set(60, 60, 60);
                    model.position.set(
                        (Math.random() - 0.5) * 300,
                        0,
                        -200 - i * 300
                    );
                    scene.add(model);
                });
            }

            loading.style.display = 'none';

            // Entrar en VR
            renderer.xr.addEventListener('sessionstart', () => {
                portada.style.display = 'none';
                ui.style.display = 'block';
                gameActive = true;
                dolly.position.set(0, 0, 50);   // posición inicial
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function animate() {
            renderer.setAnimationLoop(() => {
                const delta = clock.getDelta();
                if (gameActive) {
                    dolly.translateZ(-40 * delta);   // avance lento
                }
                renderer.render(scene, camera);
            });
        }

        init();
        animate();
    </script>
</body>
</html>
